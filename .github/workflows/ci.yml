name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean install -DskipTests -Dsign.skip=true

      - name: Run tests
        run: mvn test -Dsign.skip=true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-jar
          path: admin/target/admin-1.0.0.jar
          retention-days: 7
