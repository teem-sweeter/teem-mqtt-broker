server:
  port: 0

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop

mqtt:
  broker:
    enabled: true
    port: 0
    websocket-port: 0
    persistence-enabled: false
    data-path: ./target/test-mqtt-data/

jwt:
  secret: test-secret-key-must-be-at-least-32bytes
  expiration: 86400000
